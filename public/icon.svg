<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#3f3f46"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Building icon -->
  <g fill="white">
    <!-- Main building -->
    <rect x="160" y="180" width="192" height="220" rx="8"/>
    <!-- Windows row 1 -->
    <rect x="185" y="210" width="36" height="36" rx="4" fill="#18181b"/>
    <rect x="238" y="210" width="36" height="36" rx="4" fill="#18181b"/>
    <rect x="291" y="210" width="36" height="36" rx="4" fill="#18181b"/>
    <!-- Windows row 2 -->
    <rect x="185" y="265" width="36" height="36" rx="4" fill="#18181b"/>
    <rect x="238" y="265" width="36" height="36" rx="4" fill="#18181b"/>
    <rect x="291" y="265" width="36" height="36" rx="4" fill="#18181b"/>
    <!-- Door -->
    <rect x="226" y="330" width="60" height="70" rx="4" fill="#18181b"/>
    <!-- Crane -->
    <rect x="340" y="100" width="12" height="180" fill="white"/>
    <rect x="280" y="100" width="100" height="12" fill="white"/>
    <rect x="280" y="100" width="12" height="50" fill="white"/>
    <!-- Crane hook -->
    <rect x="282" y="140" width="8" height="30" fill="white"/>
    <rect x="276" y="165" width="20" height="8" fill="white"/>
  </g>
  <!-- Rupee symbol -->
  <circle cx="400" cy="380" r="56" fill="#22c55e"/>
  <text x="400" y="400" font-family="Arial" font-size="60" font-weight="bold" fill="white" text-anchor="middle">₹</text>
</svg>

